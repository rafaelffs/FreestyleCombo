name: Deploy to Production

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]

env:
  IMAGE: ghcr.io/${{ github.repository_owner }}/freestylecombo-api

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    permissions:
      contents: read
      packages: write   # needed to push to GHCR

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      # ── React build (served by host Nginx, no Docker involved) ──────────────
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Build React app
        run: |
          cd web
          npm ci
          npm run build

      # ── Docker image build & push to GHCR ───────────────────────────────────
      # This runs in CI so the VPS never has to compile .NET — just pull & swap.
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push API image
        uses: docker/build-push-action@v5
        with:
          context: ./api
          file: ./api/FreestyleCombo.API/Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE }}:latest
            ${{ env.IMAGE }}:${{ github.event.workflow_run.head_sha }}

      # ── SSH setup ───────────────────────────────────────────────────────────
      - name: Set up SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.DEPLOY_HOST }} >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Create deployment directories on server
        run: |
          ssh -i ~/.ssh/deploy_key ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }} \
            "mkdir -p /opt/freestylecombo && mkdir -p /var/www/freestylecombo"

      # ── Sync static files to VPS ────────────────────────────────────────────
      - name: Sync docker-compose.prod.yml to server
        run: |
          rsync -avz --delete \
            -e "ssh -i ~/.ssh/deploy_key" \
            docker-compose.prod.yml \
            ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}:/opt/freestylecombo/

      - name: Sync nginx config to server
        run: |
          rsync -avz \
            -e "ssh -i ~/.ssh/deploy_key" \
            nginx/nginx.conf \
            ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}:/opt/freestylecombo/nginx.conf.new

      - name: Sync React build to server
        run: |
          rsync -avz --delete \
            -e "ssh -i ~/.ssh/deploy_key" \
            web/dist/ \
            ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}:/var/www/freestylecombo/

      # ── Deploy: pull pre-built image and do a fast container swap ───────────
      # The DB container is never touched — only the API container is restarted.
      # Downtime = docker container stop + start (seconds, not minutes).
      - name: Deploy API container
        run: |
          ssh -i ~/.ssh/deploy_key ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }} << EOF
            set -e
            cd /opt/freestylecombo

            # Log in to GHCR with the token passed from CI (valid for this run)
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin

            # Ensure DB is running (no-op if already up)
            docker compose -f docker-compose.prod.yml up -d --no-deps db

            # Pull the newly pushed image — this happens while the old container is still serving traffic
            docker compose -f docker-compose.prod.yml pull api

            # Swap the API container only; DB is untouched
            docker compose -f docker-compose.prod.yml up -d --no-deps api

            docker logout ghcr.io
          EOF

      - name: Wait for API to be ready
        run: |
          ssh -i ~/.ssh/deploy_key ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }} << 'EOF'
            set -e
            echo "Waiting for API..."
            for i in $(seq 1 30); do
              if curl -sf http://localhost:5050/swagger > /dev/null 2>&1; then
                echo "API is ready"
                break
              fi
              echo "Attempt $i/30..."
              sleep 3
            done
          EOF

      # ── Nginx config hot-reload (zero downtime) ──────────────────────────────
      - name: Update and reload Nginx config
        run: |
          ssh -i ~/.ssh/deploy_key ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }} << 'EOF'
            set -e
            sudo cp /opt/freestylecombo/nginx.conf.new /etc/nginx/conf.d/freestylecombo.conf
            sudo nginx -t
            sudo systemctl reload nginx
            echo "Nginx reloaded"
          EOF

      # ── Verify ──────────────────────────────────────────────────────────────
      - name: Verify deployment
        run: |
          ssh -i ~/.ssh/deploy_key ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }} << 'EOF'
            set -e
            for i in $(seq 1 10); do
              if curl -fsS http://localhost/api/tricks > /dev/null; then
                echo "✓ Deployment verified"
                exit 0
              fi
              sleep 2
            done
            echo "✗ Verification failed"
            exit 1
          EOF

      - name: Cleanup
        if: always()
        run: rm -f ~/.ssh/deploy_key

  notify:
    needs: deploy
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Deployment status
        run: |
          if [ "${{ needs.deploy.result }}" == "success" ]; then
            echo "✓ Production deployment successful"
          else
            echo "✗ Production deployment failed"
            exit 1
          fi
