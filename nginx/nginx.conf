server {
    listen 80;
    server_name fscombo.com www.fscombo.com;
    return 301 https://www.fscombo.com$request_uri;
}

server {
    listen 443 ssl;
    server_name fscombo.com www.fscombo.com;

    ssl_certificate /etc/letsencrypt/live/fscombo.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/fscombo.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    root /var/www/freestylecombo;
    index index.html;

    location /api/ {
        proxy_pass http://127.0.0.1:5050/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
