services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: freestyle_combo
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    ports:
      - "6379:6379"

  api:
    build:
      context: ./api
      dockerfile: FreestyleCombo.API/Dockerfile
    ports:
      - "5050:8080"
    environment:
      ConnectionStrings__DefaultConnection: "Host=db;Database=freestyle_combo;Username=postgres;Password=postgres"
      JwtSettings__Secret: "your-secret-key-here-minimum-32-characters"
      JwtSettings__Issuer: "FreestyleComboAPI"
      JwtSettings__Audience: "FreestyleComboApp"
      Anthropic__ApiKey: ""
    depends_on:
      - db
      - redis

volumes:
  postgres_data:
